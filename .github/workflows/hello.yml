#this is workflow name
name: Hello workflow

#runs on trigger
on: 
    push:
        branches: [main]
#these are jobs inside workflow
jobs:
#this is name of job
    greet:
    #this is github runner
        runs-on: ubuntu-latest
        steps:
            - name: say hello to users
              run: echo "Hello Dosto"

            - name: say hello to username
              run: echo "hello user"
    details:
        runs-on: ubuntu-latest
        steps:
            - name: this job runs to checck free disk and free memory 
              run: df -h && free -h
